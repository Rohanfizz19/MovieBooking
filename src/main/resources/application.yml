spring:
  datasource:
    url: jdbc:h2:mem:moviedb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  jwt:
    secret: mySecretKeyForJWTtokenGenerationThatIsAtLeast256BitsLong
    expiration-ms: 86400000
  booking:
    hold-timeout-minutes: 10
