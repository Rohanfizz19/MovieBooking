spring:
  datasource:
    url: jdbc:mysql://localhost:3306/movie_booking?createDatabaseIfNotExist=true
    username: root
    password: root;
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    secret: jwtSecretKey
    expiration-ms: 86400000
  booking:
    hold-timeout-minutes: 10